name: Test RTK Setup

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  test-rtk-setup:
    runs-on: macos-15

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install RTK
        run: |
          brew install rtk

      - name: Verify Sparkdock RTK setup
        run: |
          bash sjust/scripts/rtk/verify-setup.sh
