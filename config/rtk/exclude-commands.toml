[hooks]
exclude_commands = [
  "git push",
  "git branch -D",
  "git reset --hard",
  "git clean",
  "kubectl apply",
  "kubectl create",
  "kubectl delete",
  "kubectl drain",
  "kubectl patch",
  "kubectl replace",
  "helm install",
  "helm upgrade",
  "helm uninstall",
  "helm delete",
  "helm rollback",
  "terraform apply",
  "terraform destroy",
  "terraform state rm",
  "aws ec2 terminate-instances",
  "aws s3 rm",
  "aws s3 rb",
  "aws rds delete-db-instance",
  "aws rds delete-db-cluster",
  "aws cloudformation delete-stack",
  "gcloud projects delete",
  "gcloud sql instances delete",
  "gcloud storage rm",
  "gcloud storage buckets delete",
]
