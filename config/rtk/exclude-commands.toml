[hooks]
exclude_commands = [
  "^git push(?: .*)?(?: --force| -f)(?:$| )",
  "git reset --hard",
  "^kubectl (?:apply|delete|patch|replace)(?:$| )",
  "^helm (?:uninstall|delete|rollback)(?:$| )",
  "terraform destroy",
  "terraform state rm",
  "^gcloud(?: .*)? destroy(?:$| )",
  "^gcloud (?:projects delete|sql instances delete|storage rm|storage buckets delete)(?:$| )",
]
