# macOS System Defaults — sparkdock curated profile
#
# Schema (one entry per setting, top-level key is "<domain>.<key>"):
#
#   "<domain>.<key>":
#     domain:      <CFBundleIdentifier or NSGlobalDomain>
#     key:         <preference key>
#     type:        bool | int | float | string
#     value:       <typed value; ${HOME} is expanded in string values>
#     description: <short human-readable description>
#     category:    <grouping for the docs table; free-form, kebab-case>
#     requires:    <list of process names to killall when this value changes; may be empty>
#
# User overrides:
#   ~/.local/spark/macos-defaults/overrides.yml is merged on top using the same shape.
#   Top-level keys are merged by name, so an override on "com.apple.dock.autohide"
#   replaces the curated value for that exact setting and leaves every other
#   entry untouched.
#
# Apple Silicon only (per AGENTS.md). Keys deprecated or no-op on supported
# macOS versions are intentionally absent.

